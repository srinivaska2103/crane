<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="Icon" href="assets/logo">
    <title>HeavyLift Pro | Industrial Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        function applySettings() {
            if (localStorage.theme === 'dark') document.documentElement.classList.add('dark');
            document.documentElement.dir = localStorage.dir || 'ltr';
        }
        applySettings();
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 font-sans transition-colors duration-300">

    <!-- Navbar -->
    <nav class="p-4 md:p-6 flex justify-between items-center bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800">
        <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity flex-shrink-0">
            <img src="assets/logo" alt="Logo" class="w-8 h-8 md:w-10 md:h-10 object-contain dark:invert">
            <span class="text-xl md:text-2xl font-bold text-gray-900 dark:text-white">Crane</span>
        </a>        
        <div class="flex gap-2 md:gap-4">
            <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center bg-gray-200 dark:bg-gray-700 rounded-full hover:bg-orange-500 hover:text-white transition-all transform hover:scale-105 active:scale-95 text-lg">🌓</button>
            <button onclick="toggleDir()" id="dir-btn" class="w-10 h-10 flex items-center justify-center bg-gray-200 dark:bg-gray-700 rounded-full hover:bg-orange-500 hover:text-white transition-all transform hover:scale-105 active:scale-95 text-xs font-bold">LTR</button>
        </div>
    </nav>

    <!-- Login Container -->
    <main class="min-h-[80vh] flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white dark:bg-gray-900 p-6 md:p-8 rounded-3xl shadow-xl border border-gray-100 dark:border-gray-800 transition-colors duration-300">
<h2 class="text-2xl md:text-3xl font-semibold text-center text-gray-900 dark:text-white mb-2">
    Welcome Back
</h2>
<p class="text-center text-gray-500 dark:text-gray-400 mb-8 text-sm md:text-base">
    Please enter your details to access your account.
</p>        
        <form class="space-y-4">
            <input type="email" placeholder="Email Address" class="w-full p-3 md:p-4 rounded-xl bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 focus:ring-2 focus:ring-orange-600 outline-none text-sm md:text-base text-gray-900 dark:text-white placeholder-gray-400">
            
            <div class="relative">
                <input type="password" id="pass" placeholder="Password" class="w-full p-3 md:p-4 rounded-xl bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 focus:ring-2 focus:ring-orange-600 outline-none text-sm md:text-base text-gray-900 dark:text-white placeholder-gray-400">
                <!-- Professional Eye Icon -->
                <button type="button" onclick="togglePass()" class="absolute right-4 top-4 text-gray-400 hover:text-orange-600">
                    <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
            </div>

            <div class="flex justify-between items-center text-xs md:text-sm">
                <label class="flex items-center gap-2 text-gray-600 dark:text-gray-300 cursor-pointer">
                    <input type="checkbox" class="accent-orange-600 w-4 h-4 rounded border-gray-300"> Remember me
                </label>
                <a href="#" class="text-orange-600 font-semibold hover:underline">Forgot Password?</a>
            </div>

            <button class="w-full py-3 md:py-4 bg-orange-600 text-white font-semibold rounded-xl hover:bg-orange-700 transition-all hover:scale-[1.02] active:scale-[0.98]">Login</button>
        </form>

        <!-- Social Logins with SVGs -->
        <div class="mt-8 flex gap-2 md:gap-4">
            <button class="flex-1 flex items-center justify-center gap-2 py-2 md:py-3 border border-gray-200 dark:border-gray-700 rounded-xl text-xs md:text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all">
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-google" viewBox="0 0 16 16">
  <path d="M15.545 6.558a9.4 9.4 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.7 7.7 0 0 1 5.352 2.082l-2.284 2.284A4.35 4.35 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.8 4.8 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.7 3.7 0 0 0 1.599-2.431H8v-3.08z"/>
</svg>                Google
            </button>
            <button class="flex-1 flex items-center justify-center gap-2 py-2 md:py-3 border border-gray-200 dark:border-gray-700 rounded-xl text-xs md:text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all">
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-facebook" viewBox="0 0 16 16">
  <path d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951"/>
</svg>                Facebook
            </button>
            <button class="flex-1 flex items-center justify-center gap-2 py-2 md:py-3 border border-gray-200 dark:border-gray-700 rounded-xl text-xs md:text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all">
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-apple" viewBox="0 0 16 16">
  <path d="M11.182.008C11.148-.03 9.923.023 8.857 1.18c-1.066 1.156-.902 2.482-.878 2.516s1.52.087 2.475-1.258.762-2.391.728-2.43m3.314 11.733c-.048-.096-2.325-1.234-2.113-3.422s1.675-2.789 1.698-2.854-.597-.79-1.254-1.157a3.7 3.7 0 0 0-1.563-.434c-.108-.003-.483-.095-1.254.116-.508.139-1.653.589-1.968.607-.316.018-1.256-.522-2.267-.665-.647-.125-1.333.131-1.824.328-.49.196-1.422.754-2.074 2.237-.652 1.482-.311 3.83-.067 4.56s.625 1.924 1.273 2.796c.576.984 1.34 1.667 1.659 1.899s1.219.386 1.843.067c.502-.308 1.408-.485 1.766-.472.357.013 1.061.154 1.782.539.571.197 1.111.115 1.652-.105.541-.221 1.324-1.059 2.238-2.758q.52-1.185.473-1.282"/>
  <path d="M11.182.008C11.148-.03 9.923.023 8.857 1.18c-1.066 1.156-.902 2.482-.878 2.516s1.52.087 2.475-1.258.762-2.391.728-2.43m3.314 11.733c-.048-.096-2.325-1.234-2.113-3.422s1.675-2.789 1.698-2.854-.597-.79-1.254-1.157a3.7 3.7 0 0 0-1.563-.434c-.108-.003-.483-.095-1.254.116-.508.139-1.653.589-1.968.607-.316.018-1.256-.522-2.267-.665-.647-.125-1.333.131-1.824.328-.49.196-1.422.754-2.074 2.237-.652 1.482-.311 3.83-.067 4.56s.625 1.924 1.273 2.796c.576.984 1.34 1.667 1.659 1.899s1.219.386 1.843.067c.502-.308 1.408-.485 1.766-.472.357.013 1.061.154 1.782.539.571.197 1.111.115 1.652-.105.541-.221 1.324-1.059 2.238-2.758q.52-1.185.473-1.282"/>
</svg>                Apple
            </button>
        </div>

        <p class="mt-6 text-center text-sm text-gray-500 dark:text-gray-400">Don't have an account? <a href="signup.html" class="text-orange-600 font-semibold hover:underline">Sign Up</a></p>
    </div>
</main>

    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        }
        function toggleDir() {
            const btn = document.getElementById('dir-btn');
            const newDir = document.documentElement.dir === 'rtl' ? 'ltr' : 'rtl';
            document.documentElement.dir = newDir;
            localStorage.dir = newDir;
            btn.innerText = newDir.toUpperCase();
        }
        function togglePass() {
            const p = document.getElementById('pass');
            p.type = p.type === 'password' ? 'text' : 'password';
        }
        // Initialize button state
        document.getElementById('dir-btn').innerText = (localStorage.dir || 'ltr').toUpperCase();
    </script>
</body>
</html>
